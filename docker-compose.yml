version: "3"
services:
  map-listening-web:
    image: nginx:1.25-alpine-slim
    container_name: map-listening-web
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./web:/usr/share/nginx/html
    ports:
      - '${PUBLIC_PORT}:80'
    networks:
      - map-listening-frontend-net
    depends_on:
      - map-listening-api
      - map-listening-pgadmin

  map-listening-db:
    image: postgres:16.2-alpine3.19
    container_name: map-listening-db
    restart: always
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'PGDATA=/pgdata'
    # ports:
    #   - '127.0.0.1:${POSTGRES_PORT}:5432'
    volumes:
      - ./postgres-data:/pgdata
      - '${POSTGRES_INIT_DB_DIR}:/docker-entrypoint-initdb.d'
    networks:
      - map-listening-backend-net

  map-listening-pgadmin:
    image: dpage/pgadmin4:8.5
    container_name: map-listening-pgadmin
    restart: always
    # user: 'root'
    environment:
      - 'PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}'
      - 'PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}'
    volumes:
      - ./pgadmin-data:/var/lib/pgadmin
    networks:
      - map-listening-backend-net
      - map-listening-frontend-net
    depends_on:
      - map-listening-db

  map-listening-redis:
    image: "redis:8.2-alpine"
    container_name: map-listening-redis
    restart: always
    # ports:
    #   - '127.0.0.1:${REDIS_PORT}:6379'
    volumes:
      - ./redis-data:/data
    networks:
      - map-listening-backend-net

  map-listening-api:
    image: directus/directus:11.10.0
    container_name: map-listening-api
    restart: always
    logging:
      driver: 'local'
      options:
        max-size: '20m'
        max-file: '5'
        compress: 'true'
    # ports:
    #   - 8055:8055
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
      - ./snapshots:/directus/snapshots
      - ./database/migrations:/directus/database-migrations
    depends_on:
      - map-listening-db
      - map-listening-redis
    env_file:
      - .env
    networks:
      - map-listening-backend-net
      - map-listening-frontend-net

networks:
  map-listening-backend-net:
  map-listening-frontend-net:
